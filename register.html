        <br>

        </div>

                 <option>إعدادي</option>
                <option>ثانوي</option>

            </select>
            <br><br>
          <h3>اختار المواد</h3>
            <label>عربي</label>
            <input type="checkbox" >
              <label>إنجليزي</label>
            <input type="checkbox" >
              <label>رياضيات</label>
            <input type="checkbox" >

              <label>حاسب</label>
            <input type="checkbox" >

        </div>
        <div class="قسم إضافي">

            <label>ذكر</label>
            <input type="radio" name="الجنس"><br>
            <label>أنثى</label>
            <input type="radio" name="الجنس"><br>
            <br>
            <h3>هل أنت طالب جديد؟</h3>
            <label>نعم</label>
            <input type="radio" name="ؤ" required>
            <label>لا</label>
            <input type="radio" name="ؤ" required>
            <br>
            <h3>مشاكل
                طلبات
                استفسار</h3>
            <input type="tel" >

        <br>

        <label>تسجيل</label>
        <input type="submit">
    </form>
</header>

</html>
